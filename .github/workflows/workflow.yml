name: Build Hugo and deploy to S3

on:
  push:
    brancehs: [main]

inputs:
  HUGO_VERSION:
    description: 'Description of variable 1'
    required: true
  variable2:
    description: 'Description of variable 2'
    required: true
  variable3:
    description: 'Description of variable 3'
    required: true
    ${AWS_ACCESS_KEY_ID}
${AWS_SECRET_ACCESS_KEY}
${AWS_REGION}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out main
      - uses: actions/checkout@v3